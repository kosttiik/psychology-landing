name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

# Allow only one concurrent deployment; don't cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Build-time public values (site URL, public Telegram handle).
      # Not secrets — kept out of the repo and injected from repository Variables.
      # Settings -> Secrets and variables -> Actions -> Variables.
      # Fallbacks let the build succeed even before the Variables are set.
      - name: Generate .env.production
        run: |
          {
            echo "VITE_TG_URL=${{ vars.VITE_TG_URL || 'https://t.me/mariia_cbt' }}"
            echo "VITE_TG_HANDLE=${{ vars.VITE_TG_HANDLE || '@mariia_cbt' }}"
            echo "VITE_SITE_URL=${{ vars.VITE_SITE_URL || 'https://mariiapopova.ru' }}"
          } > .env.production

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
